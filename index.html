<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoPulse</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      #auth-overlay {
        position: fixed; inset: 0; z-index: 9999;
        background: #0a0f1e;
        display: flex; align-items: center; justify-content: center;
      }
      #auth-overlay.hidden { display: none; }
      #auth-box {
        background: #111827;
        border: 1px solid #1e40af;
        border-radius: 12px;
        padding: 40px 48px;
        text-align: center;
        max-width: 360px; width: 90%;
      }
      #auth-box h2 { color: #38bdf8; margin: 0 0 6px; font-size: 1.5em; }
      #auth-box p { color: #94a3b8; margin: 0 0 24px; font-size: 0.95em; }
      #auth-input {
        width: 100%; box-sizing: border-box;
        padding: 10px 14px; border-radius: 8px;
        border: 1px solid #334155; background: #0f172a;
        color: #e2e8f0; font-size: 1em; margin-bottom: 12px; outline: none;
      }
      #auth-input:focus { border-color: #38bdf8; }
      #auth-btn {
        width: 100%; padding: 10px; border-radius: 8px;
        background: #1e40af; color: #fff;
        border: none; font-size: 1em; cursor: pointer;
      }
      #auth-btn:hover { background: #2563eb; }
      #auth-error { color: #f87171; font-size: 0.88em; margin-top: 10px; min-height: 1.2em; }

      /* Regime / Comment section */
      .regime-panel {
        background: #0f172a;
        border: 1px solid #1e3a5f;
        border-radius: 10px;
        padding: 18px 22px;
        margin-bottom: 14px;
      }
      .regime-label {
        font-size: 0.78em; color: #64748b; text-transform: uppercase;
        letter-spacing: 0.08em; margin-bottom: 4px;
      }
      .regime-value {
        font-size: 1.15em; font-weight: 600; color: #38bdf8;
      }
      .regime-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
        margin-top: 14px;
      }
      .regime-narrative {
        margin-top: 14px; color: #94a3b8; font-size: 0.92em;
        line-height: 1.6; border-left: 3px solid #1e40af; padding-left: 12px;
      }

      /* Liquidation monitor section */
      .liq-monitor-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
        margin-top: 12px;
      }
      .liq-card {
        background: #0f172a;
        border: 1px solid #1e3a5f;
        border-radius: 8px;
        padding: 14px 16px;
      }
      .liq-symbol { font-size: 1em; font-weight: 700; color: #e2e8f0; }
      .liq-window-row { display: flex; justify-content: space-between; font-size: 0.82em; margin-top: 5px; }
      .liq-window-label { color: #64748b; }
      .liq-usd { color: #93c5fd; font-variant-numeric: tabular-nums; }
      .liq-score-bullish { color: #4ade80; }
      .liq-score-bearish { color: #f87171; }
      .liq-score-neutral  { color: #94a3b8; }
      .liq-empty { color: #475569; font-size: 0.88em; padding: 10px 0; }
    </style>
  </head>
  <body>
    <!-- 密碼保護（hash 比對，不儲存明文） -->
    <div id="auth-overlay">
      <div id="auth-box">
        <h2>CryptoPulse</h2>
        <p>請輸入存取密碼</p>
        <input type="password" id="auth-input" placeholder="密碼" autocomplete="current-password" />
        <button id="auth-btn">進入</button>
        <p id="auth-error"></p>
      </div>
    </div>
    <script>
      // 密碼以 SHA-256 hash 比對，不在原始碼中儲存明文
      const SITE_HASH = "0126849541af00c027b518c4dcecac99e4769465ee3fb763bb067277065c20fe";
      (function () {
        const overlay = document.getElementById("auth-overlay");
        const input   = document.getElementById("auth-input");
        const btn     = document.getElementById("auth-btn");
        const errMsg  = document.getElementById("auth-error");
        if (localStorage.getItem("cp_auth") === "1") { overlay.classList.add("hidden"); return; }
        async function tryLogin() {
          const enc = new TextEncoder().encode(input.value);
          const buf = await crypto.subtle.digest("SHA-256", enc);
          const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
          if (hex === SITE_HASH) {
            localStorage.setItem("cp_auth", "1");
            overlay.classList.add("hidden");
          } else {
            errMsg.textContent = "密碼錯誤，請再試一次";
            input.value = ""; input.focus();
          }
        }
        btn.addEventListener("click", tryLogin);
        input.addEventListener("keydown", (e) => { if (e.key === "Enter") tryLogin(); });
        input.focus();
      })();
    </script>

    <main class="container">

      <!-- ── Header ────────────────────────────────────────────── -->
      <header class="hero">
        <div class="hero-inner">
          <div>
            <h1>CryptoPulse</h1>
            <div id="meta"></div>
          </div>
          <nav class="top-nav">
            <a class="badge medium" href="./v2/">V2 來源</a>
            <a class="badge medium" href="./v3/">V3 衍生品</a>
            <a class="badge medium" href="./v4/">V4 工具</a>
            <a class="badge medium" href="./api_docs.html">API 文檔</a>
          </nav>
        </div>
      </header>

      <!-- ── Section 0: 宏觀 Regime / Comment ─────────────────── -->
      <section id="regime-section">
        <h2>宏觀 Regime</h2>
        <div id="regime-panel" class="regime-panel">
          <p style="color:#475569">載入中…</p>
        </div>
      </section>

      <!-- ── Section 1: 市場 Gate 評分（最終綜合評估）────────── -->
      <section id="gate-section">
        <h2>市場 Gate 評分</h2>
        <div class="gate-hero">
          <div id="gate-summary" class="gate-status-panel">
            <p style="color:#94a3b8">Coinglass 資料載入中…</p>
          </div>
          <div class="gate-bar-wrap">
            <div class="composite-title" style="margin-bottom:10px">Gate 7 維度評分</div>
            <canvas id="gate-bar"></canvas>
          </div>
        </div>
        <div id="gate-composite" class="gate-composite-wrap"></div>
        <div id="gate-composite-history" class="gate-composite-history-wrap" style="display:none">
          <div class="composite-history-title">Composite Score 近期走勢</div>
          <canvas id="gate-composite-chart" height="80"></canvas>
        </div>
      </section>

      <!-- ── Section 2: 清算監控 ───────────────────────────────── -->
      <section id="liquidation-section">
        <h2>清算監控</h2>
        <div id="liq-monitor" class="liq-monitor-grid">
          <p class="liq-empty">載入中…</p>
        </div>
      </section>

      <!-- ── Section 3: 市場概覽（趨勢 + 概覽卡片）─────────── -->
      <section id="overview-section">
        <h2>市場概覽</h2>
        <div id="overall-trend" class="trend-banner"></div>
        <div id="overview-cards" class="card-grid overview-card-grid" style="margin-top:14px"></div>
      </section>

      <!-- ── Section 4: 交易員摘要 ────────────────────────────── -->
      <section id="ai-section">
        <h2>交易員摘要</h2>
        <ul id="ai-insights" class="card-list"></ul>
      </section>

      <!-- ── Section 5: 未來 7 日關鍵窗口 ─────────────────────── -->
      <section id="windows-section">
        <h2>未來 7 日關鍵窗口</h2>
        <div id="key-windows-note" class="note"></div>
        <div id="key-windows" class="card-grid"></div>
      </section>

      <!-- ── Section 6: 訊號中心（tab 切換）───────────────────── -->
      <section id="signals-section">
        <h2>訊號中心</h2>

        <div class="tab-bar">
          <button class="tab-btn active" data-tab="crypto">
            <span class="tab-icon">📡</span> 加密訊號
          </button>
          <button class="tab-btn" data-tab="whale">
            <span class="tab-icon">🐋</span> 巨鯨走向
          </button>
          <button class="tab-btn" data-tab="policy">
            <span class="tab-icon">🏛</span> 政策/監管
          </button>
          <button class="tab-btn" data-tab="risk">
            <span class="tab-icon">⚠️</span> 外部風險
          </button>
        </div>

        <!-- 加密訊號 -->
        <div class="tab-panel active" id="tab-crypto">
          <div class="controls">
            <label>
              <input id="only-high-impact" type="checkbox" />
              只看高影響（僅篩選本區）
            </label>
          </div>
          <div id="crypto-signals" class="card-grid"></div>
          <span id="crypto-section" style="display:none"></span>
        </div>

        <!-- 巨鯨走向 -->
        <div class="tab-panel" id="tab-whale">
          <div id="whale-trend" class="card"></div>
          <span id="whale-section" style="display:none"></span>
        </div>

        <!-- 政策/監管 -->
        <div class="tab-panel" id="tab-policy">
          <div id="policy-signals" class="card-grid"></div>
          <span id="policy-section" style="display:none"></span>
        </div>

        <!-- 外部風險 -->
        <div class="tab-panel" id="tab-risk">
          <div id="global-risks" class="card-grid"></div>
          <span id="risk-section" style="display:none"></span>
        </div>

      </section>

      <!-- ── Section 7: 宏觀日程 ───────────────────────────────── -->
      <section id="macro-section">
        <h2>美日宏觀日程</h2>
        <div class="macro-filter-bar">
          <button class="macro-tab active" data-filter="all">全部</button>
          <button class="macro-tab" data-filter="recent">近期／已公布（最新優先）</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>國家</th>
                <th>事件</th>
                <th>重要度</th>
                <th>狀態</th>
                <th>已公布數據</th>
                <th>簡短分析</th>
              </tr>
            </thead>
            <tbody id="macro-body"></tbody>
          </table>
        </div>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
    <script type="module" src="./app.js?v=20260414-regime"></script>
  </body>
</html>
