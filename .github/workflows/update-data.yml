name: Update Dashboard Data

on:
  schedule:
    - cron: "0 * * * *"   # 每小時整點自動執行
  workflow_dispatch:        # 支援手動從 GitHub 介面觸發

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: v1/package-lock.json

      - name: Install dependencies (V1)
        run: npm ci
        working-directory: v1

      - name: Install dependencies (V4)
        run: npm install
        working-directory: v4

      - name: Run data update (V1)
        run: node v1/scripts/update-data.mjs
        env:
          UPSTASH_REDIS_REST_URL:         ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN_WRITE: ${{ secrets.UPSTASH_REDIS_REST_TOKEN_WRITE }}
          UPSTASH_REDIS_REST_TOKEN_READ:  ${{ secrets.UPSTASH_REDIS_REST_TOKEN_READ }}
          COINGLASS_API_KEY:              ${{ secrets.COINGLASS_API_KEY }}

      - name: Fetch Polymarket data
        run: |
          mkdir -p v1/docs/data
          node scripts/polymarket_eth.mjs
        env:
          UPSTASH_REDIS_REST_URL:         ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN_WRITE: ${{ secrets.UPSTASH_REDIS_REST_TOKEN_WRITE }}

      - name: Run V4 data collection
        run: node v4/scripts/collect-all.mjs
        continue-on-error: true   # 收集失敗不中斷整個部署流程
        # 必須在 V2 test 之前執行，確保讀到提交版的 fetch-report.json（穩定 55 PASS）

      - name: Update V2 source availability report
        run: node v2/scripts/test-sources.mjs --report v2/data/fetch-report.json
        continue-on-error: true   # 測試失敗不中斷整個部署流程

      - name: Build site (_site = V1 + V2 + V4)
        run: |
          mkdir -p _site/v2/data _site/v2/scripts _site/v4/data
          cp -r v1/docs/. _site/
          cp v2/index.html _site/v2/index.html
          cp v2/app.js _site/v2/app.js
          cp v2/data/sources.json _site/v2/data/sources.json
          cp v2/data/kol.json _site/v2/data/kol.json
          cp v2/data/fetch-report.json _site/v2/data/fetch-report.json
          cp -r v4/docs/. _site/v4/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
